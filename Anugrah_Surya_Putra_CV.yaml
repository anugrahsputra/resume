design:
  theme: engineeringresumes
  page:
    size: us-letter
    top_margin: 0.4in
    bottom_margin: 0.4in
    left_margin: 0.5in
    right_margin: 0.5in
    show_footer: false
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
  typography:
    line_spacing: 0.4em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: XCharter
      name: XCharter
      headline: XCharter
      connections: XCharter
      section_titles: XCharter
    font_size:
      body: 10pt
      name: 24pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.1em
    bold:
      name: false
      headline: false
      connections: false
      section_titles: true
  links:
    underline: true
    show_external_link_icon: false
  header:
    alignment: center
    space_below_name: 0.3cm
    space_below_headline: 0.2cm
    space_below_connections: 0.5cm
    connections:
      separator: " | "
      show_icons: false
      display_urls_instead_of_usernames: true
  section_titles:
    type: with_full_line
    space_above: 0.3cm
    space_below: 0.1cm
  sections:
    space_between_regular_entries: 0.3cm
    space_between_text_based_entries: 0.1cm
    show_time_spans_in: []
  entries:
    side_space: 0cm
    short_second_row: false
    highlights:
      bullet: ●
      space_left: 0.3cm
      space_above: 0.05cm
      space_between_items: 0.05cm
      space_between_bullet_and_text: 0.3em

